<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Diabetes Prediction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
    form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; font-size: 14px; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    .submit { grid-column: 1 / -1; text-align: right; }
    .result { margin-top: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Diabetes Prediction</h1>

  {% if prediction %}
    <div class="result">Hasil prediksi: {{ prediction }}</div>
  {% endif %}

  <form method="post" action="/predict">
    <div><label>Pregnancies</label><input type="number" name="pregnancies" required></div>
    <div><label>Glucose</label><input type="number" name="glucose" required></div>
    <div><label>BloodPressure</label><input type="number" name="bloodpressure" required></div>
    <div><label>SkinThickness</label><input type="number" name="skinthickness" required></div>
    <div><label>Insulin</label><input type="number" name="insulin" required></div>
    <div><label>BMI</label><input type="number" step="0.1" name="bmi" required></div>
    <div><label>DiabetesPedigreeFunction</label><input type="number" step="0.001" name="diabetespedigreefunction" required></div>
    <div><label>Age</label><input type="number" name="age" required></div>

    <div class="submit"><button type="submit">Predict</button></div>
  </form>
</body>
</html>
